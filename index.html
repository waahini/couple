<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 얼굴 관상 궁합 전문가 AI ✨</title>
    <link rel="stylesheet" href="style.css">
    <!-- AdSense Placeholder: Header -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-YOUR_AD_CLIENT_ID" crossorigin="anonymous"></script>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>💖 글로벌 얼굴 관상 궁합 전문가 AI 💖</h1>
            <p>소셜 미디어 대유행! 두 사람의 사진으로 전생의 인연을 확인하세요.</p>
        </header>

        <!-- AdSense Slot: Top -->
        <div class="adsense-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-YOUR_AD_CLIENT_ID"
                 data-ad-slot="1234567890"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            <div class="ad-placeholder">광고 게재 영역 (본문 상단)</div>
        </div>

        <main>
            <section class="upload-section">
                <div class="upload-container">
                    <label class="upload-box" id="drop-1">
                        <span class="box-text">첫 번째 사진 📸</span>
                        <img id="img-1" class="preview-img">
                        <input type="file" id="input-1" accept="image/*" hidden>
                    </label>
                    <div class="plus-icon">➕</div>
                    <label class="upload-box" id="drop-2">
                        <span class="box-text">두 번째 사진 📸</span>
                        <img id="img-2" class="preview-img">
                        <input type="file" id="input-2" accept="image/*" hidden>
                    </label>
                </div>
                <button id="analyze-btn" class="main-btn">운명의 궁합 분석하기 ✨</button>
            </section>

            <section id="loading-section" class="hidden">
                <div class="loading-animation">
                    <div class="spinner"></div>
                    <p id="loading-msg">이목구비 각도 분석 중...</p>
                </div>
            </section>

            <section id="result-section" class="hidden">
                <div class="result-header">
                    <h2>💘 분석 결과 💘</h2>
                    <div id="result-score" class="score-display">0%</div>
                </div>

                <div class="analysis-content">
                    <div class="analysis-card">
                        <h3>👁️ 눈매와 인상의 조화</h3>
                        <p id="eye-analysis"></p>
                    </div>
                    <div class="analysis-card">
                        <h3>👄 입꼬리와 하관의 운세</h3>
                        <p id="mouth-analysis"></p>
                    </div>
                    <div class="analysis-card">
                        <h3>✨ 종합적인 아우라 매칭</h3>
                        <p id="aura-analysis"></p>
                    </div>
                </div>

                <div class="one-liner-container">
                    <p id="one-liner" class="one-liner-text"></p>
                </div>

                <div class="share-actions">
                    <button onclick="window.location.reload()" class="sub-btn">다시 하기 🔄</button>
                    <button id="share-btn" class="sub-btn share">결과 캡처/공유 📸</button>
                </div>
            </section>
        </main>

        <!-- AdSense Slot: Bottom -->
        <div class="adsense-container">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-YOUR_AD_CLIENT_ID"
                 data-ad-slot="0987654321"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            <div class="ad-placeholder">광고 게재 영역 (본문 하단)</div>
        </div>

        <footer>
            <p>© 2026 Global Face AI Compatibility. All rights reserved.</p>
            <p>본 서비스는 관상학적 재미를 위해 AI가 분석한 독창적인 가이드입니다.</p>
            <p><a href="#">개인정보 처리방침</a> | <a href="#">이용약관</a></p>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
